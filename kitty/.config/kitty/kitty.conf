include ./themes/gruvbox_dark.conf

font_family 	JetBrainsMono Nerd Font
font_size 		14.0
bold_font        auto
italic_font      auto
bold_italic_font auto

background_opacity 0.5
confirm_os_window_close 0
enable_audio_bell no
update_check_interval 0
disable_ligatures never
select_by_word_characters @-./_~? &
=%+#

# Use x11 to get window decoration on wayland
# linux_display_server x11
hide_window_decorations no

# Cursor
cursor_shape block
cursor_trail 1
cursor_blink_interval 0
shell_integration no-cursor

# Scrollback
scrollback_lines -1

remember_window_size no
initial_window_width 1050
initial_window_height 600

# Tab settings
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{tab.active_exe} -> {tab.active_wd.split('/')[-1]}" 

# can be one of: angled, slanted, or round
tab_powerline_style round
tab_activity_symbol 🔥
# ✨❗🔥 🔻


map ctrl+shift+c copy_and_clear_or_interrupt
map ctrl+shift+v paste_from_clipboard
map ctrl+c noop
map ctrl+v noop

map shift+insert paste_from_clipboard

map ctrl+backspace send_text all \x17
map ctrl+delete send_text all \x1b\x64

copy_on_select yes

confirm_os_window_close 0

background_opacity 0.85

window_margin_width 4

